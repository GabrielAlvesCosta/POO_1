<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="/static/cadastro-usuario.css">
</head>

<body>
<div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>
    <form action="/cadastro-usuario" method="POST">

        <h2>Cadastro de Usuário</h2>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ (campos|default({})).get('nome', '') }}" required>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf"  maxlength="14" placeholder="000.000.000-00" value="{{ (campos|default({})).get('cpf', '') }}" required>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" value="{{ (campos|default({})).get('idade', '') }}" min="0" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ (campos|default({})).get('email', '') }}" required>

        <label for="senha">Senha:</label>
        <div class="password-field">
            <input type="password" id="senha" name="senha" required>
            <span id="toggleSenha" class="toggle-password" title="Mostrar Senha">
                <svg xmlns="http://www.w3.org/2000/svg&quot; width="30" height="30"
                     viewBox="0 0 24 24" fill="none"
                     stroke="#374151" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </span>

        </div>
        
        <label for="cargo">Cargo</label>
<select name="cargo" id="cargo" required 
        style="width: 100%; padding: 12px; margin-bottom: 18px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;">
    <option value="comum">Comum</option>
    <option value="admin">Administrador</option>
</select>

        <button type="submit">Cadastrar</button><br><br>
        
        <a href="{{ url_for('home') }}">Voltar para início</a>

    </form>

    <script>
        const senhaInput = document.getElementById('senha');
        const toggle = document.getElementById('toggleSenha');
        const eyeIcon = toggle.querySelector('svg');

        toggle.addEventListener('click', function () {
            const visible = senhaInput.type == 'text';
            senhaInput.type = visible ? 'password' : 'text';
            eyeIcon.setAttribute('stroke', visible ? '#374151' : '#2563eb');
        });

        const cpfInput = document.getElementById('cpf');

    cpfInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 11) value = value.slice(0, 11);

        value = value.replace(/(\d{3})(\d)/, '$1.$2');
        value = value.replace(/(\d{3})(\d)/, '$1.$2');
        value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        
        e.target.value = value;
    });

    </script>

</body>
</html>
